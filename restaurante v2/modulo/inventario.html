  <head>
    <meta charset="UTF-8" />

      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
  </head>
  <body>
    <nav class="navbar is-dark" role="navigation" aria-label="main navigation">
      <div class="navbar-brand">
        <a class="navbar-item" href="../index.html"> Restaurante De juanjo</a>

        <a
          role="button"
          class="navbar-burger"
          aria-label="menu"
          aria-expanded="false"
          data-target="navbarBasicExample"
        >
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </a>
      </div>

      <div id="navbarBasicExample" class="navbar-menu">
        <div class="navbar-start">
          <a class="navbar-item" href="../index.html"> Inicio </a>
          <a class="navbar-item" href="menu.html"> Menú </a>
          <a class="navbar-item" href="pedidos.html"> Pedidos </a>
          <a class="navbar-item" href="contabilidad.html"> Contabilidad </a>

          <a class="navbar-item" href="inventario.html"> Inventario </a>
          <a class="navbar-item" href="quienes.html"> Quiénes Somos </a>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <h1 class="title has-text-centered">Inventario</h1>
        <h1 class="subtitle has-text-centered">Gestión de productos y stock</h1>
      </div>
    </section>

    <section class="section pt-0">
      <div class="container">
        <div class="columns is-centered">
          <div class="column is-8">
            <div class="box">
              <h2 class="title is-4">Registrar Nuevo Producto</h2>
                <div class="field">
                  <label class="label">Código de producto</label>
                  <div class="control">
                    <input
                      class="input"
                      type="text"
                      placeholder="Ej: PROD-001"
                      id="codigo_producto"
                      required
                    />
                  </div>
                </div>

                <div class="field">
                  <label class="label">Nombre del producto</label>
                  <div class="control">
                    <input
                      class="input"
                      type="text"
                      placeholder="Ej: Harina de trigo"
                      id="nombre_producto"
                      required
                    />
                  </div>
                </div>

                <div class="field">
                  <label class="label">Cantidad</label>
                  <div class="control">
                    <input
                      class="input"
                      type="number"
                      min="0"
                      placeholder="Ej: 50"
                      id="cantidad_producto"
                      required
                    />
                  </div>
                </div>

                <div class="field">
                  <label class="label">Marca</label>
                  <div class="control">
                    <input
                      class="input"
                      type="text"
                      placeholder="Ej: Haz de Oros"
                      id="marca_producto"
                      required
                    />
                  </div>
                </div>

                <div class="field mt-5">
              <div class="control">
                <button class="button is-link" id="guardar">Guardar</button>
              </div>
            </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../js/inventario.js"></script>
  </body>
</html>
