<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contabilidad</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
  </head>
  <body>
    <nav class="navbar is-dark" role="navigation" aria-label="main navigation">
      <div class="navbar-brand">
        <a class="navbar-item" href="../index.html"> Restaurante De juanjo</a>
      </div>

      <div id="navbarBasicExample" class="navbar-menu">
        <div class="navbar-start">
          <a class="navbar-item" href="../index.html"> Inicio </a>
          <a class="navbar-item" href="menu.html"> Menú </a>
          <a class="navbar-item" href="pedidos.html"> Pedidos </a>
          <a class="navbar-item" href="contabilidad.html"> Contabilidad </a>
          <a class="navbar-item" href="usuario.html"> Usuario </a>
          <a class="navbar-item" href="inventario.html"> Inventario </a>
          <a class="navbar-item" href="quienes.html"> Quiénes Somos </a>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <h1 class="title has-text-centered">Contabilidad</h1>
        <h1 class="subtitle has-text-centered">
          Registro de ventas y movimientos
        </h1>
      </div>
    </section>

    <section class="section pt-0">
      <div class="container">
        <div class="columns">
          <div class="column is-8">
            <div class="field">
              <label class="label">Ventas</label>
              <div class="control">
                <input
                  class="input"
                  id="ventas"
                  type="number"
                  placeholder="Ej: 50000"
                />
              </div>
            </div>

            <div class="field">
              <label class="label">Fecha</label>
              <div class="control">
                <input class="input" id="fecha" type="date" />
              </div>
            </div>

            <div class="field">
              <label class="label">Ingresos</label>
              <div class="control">
                <input
                  class="input"
                  id="ingresos"
                  type="number"
                  placeholder="Ej: 50000"
                />
              </div>
            </div>

            <div class="field">
              <label class="label">Egresos</label>
              <div class="control">
                <input
                  class="input"
                  id="egresos"
                  type="number"
                  placeholder="Ej: 20000"
                />
              </div>
            </div>

            <div class="field">
              <label class="label">Concepto</label>
              <div class="control">
                <input
                  class="input"
                  id="concepto"
                  type="text"
                  placeholder="Ej: Venta del día"
                />
              </div>
            </div>

            <div class="field">
              <label class="label">Valor</label>
              <div class="control">
                <input
                  class="input"
                  id="valor"
                  type="number"
                  placeholder="Ej: 30000"
                />
              </div>
            </div>

            <div class="field mt-5">
              <div class="control">
                <button class="button is-link" onclick="ValidarDatos()">Guardar</button>
              </div>
            </div>
          </div>
          <div class="column is-4">
            <div class="card">
              <div class="card-content has-text-centered">
                <figure class="image is-128x128 is-inline-block">
                  <img
                    class="is-rounded"
                    src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                    alt="Foto de perfil"
                  />
                </figure>
                <p class="title is-4 mt-4" id="user-name">Usuario Invitado</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const nombre = localStorage.getItem("registro_nombre");
        const apellido = localStorage.getItem("registro_apellido");

        if (nombre || apellido) {
          const nombreCompleto = `${nombre || ""} ${apellido || ""}`.trim();
          document.getElementById("user-name").textContent = nombreCompleto;
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../js/contabilidad.js"></script>
  </body>
</html>
